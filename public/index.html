<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>İstanbul GTA - Taksi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- KULLANICI ADI -->
<div id="name-screen">
  <div class="name-box">
    <h1>🏙️ İSTANBUL GTA</h1>
    <p>Taksi sür, para kazan</p>
    <input id="name-input" type="text" placeholder="Kullanıcı adın..." maxlength="16" autocomplete="off">
    <button id="name-btn">OYUNA GİR →</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="hidden">
  <div class="loading-content">
    <h1>🏙️ İSTANBUL GTA</h1>
    <div class="loader-bar"><div id="loader-fill"></div></div>
    <div id="loader-text">Şehir yükleniyor...</div>
  </div>
</div>

<!-- GARAGE -->
<div id="garage" class="hidden">
  <div class="garage-inner">
    <h2>🚗 ARAÇ SEÇ</h2>
    <div class="money" id="garage-money">💰 0 ₺</div>
    <div class="car-grid" id="car-grid"></div>
    <button id="btn-start-race">OYUNA GİR</button>
  </div>
</div>

<!-- HUD -->
<div id="ui" class="hidden">
  <div id="hud-top">
    <div id="money-display">💰 <span id="money-val">0</span> ₺</div>
    <div id="player-name-tag">👤 <span id="player-name-display">-</span></div>
    <button id="garage-btn">🏎️ Garaj</button>
  </div>

  <div id="speedometer">
    <canvas id="speedo-canvas" width="140" height="140"></canvas>
    <div id="speed-value">0</div>
    <div id="speed-label">km/h</div>
  </div>

  <div id="players-list">
    <div id="players-title">ONLINE</div>
    <div id="players-content"></div>
  </div>

  <div id="taxi-hud" class="hidden">
    <div id="taxi-status"></div>
    <div id="taxi-dest"></div>
    <div id="taxi-reward"></div>
  </div>

  <div id="npc-prompt" class="hidden">
    <span>🧍 Yolcu bekliyor — <b>E</b> ile al</span>
  </div>

  <div id="earn-popup"></div>

  <!-- YÖN OKU (canvas üstünde) -->
  <div id="direction-arrow" class="hidden">
    <div id="arrow-icon">▲</div>
    <div id="arrow-dist"></div>
  </div>

  <div id="controls-hint">
    <span>W/S Gaz/Fren</span>
    <span>A/D Direksiyon</span>
    <span>SPACE Fren</span>
    <span>E Yolcu al</span>
  </div>

  <!-- MOBİL KONTROLLER: Sol=Direksiyon, Sağ=Gaz+Fren -->
  <div id="mobile-controls">
    <!-- SOL: Direksiyon -->
    <div id="steering-zone">
      <div id="steering-left" class="steer-btn">◀</div>
      <div id="steering-right" class="steer-btn">▶</div>
    </div>
    <!-- SAĞ: Gaz + Fren + Yolcu -->
    <div id="pedal-zone">
      <button id="btn-pickup" class="mob-btn yellow">🧍</button>
      <button id="btn-gas" class="mob-btn green">⬆<br><span>GAZ</span></button>
      <button id="btn-brake" class="mob-btn red">⬇<br><span>FREN</span></button>
    </div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="game.js"></script>
</body>
</html>
